name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  # setup-java `cache: maven` uses actions/cache, which needs Actions cache API access
  actions: write

jobs:
  release:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Verify pom versions are release (not SNAPSHOT)
        run: |
          set -euo pipefail
          # The maintainer bumps -SNAPSHOT to release locally before tagging.
          # This step guards against accidentally tagging a SNAPSHOT.
          # See docs/ROADMAP.md for the release runbook.
          if grep -q 'SNAPSHOT' pom.xml \
                tokido-identity-bom/pom.xml \
                tokido-identity-api/pom.xml \
                tokido-identity-engine/pom.xml \
                tokido-identity-http/pom.xml \
                tokido-identity-dev/pom.xml \
                tokido-identity-test/pom.xml \
                tokido-identity-conformance/pom.xml; then
            echo "::error::Found SNAPSHOT version in a pom. Maintainer must bump to release before tagging."
            grep -H 'SNAPSHOT' pom.xml */pom.xml || true
            exit 1
          fi
          echo "All poms at release versions."

      - name: Build and verify
        run: mvn verify -P release -DskipITs
        env:
          # The release profile triggers maven-gpg-plugin during the verify
          # phase, which the parent settings.xml resolves via ${env.GPG_PASSPHRASE}.
          # Without this env block, the verify step fails with "Bad passphrase".
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Verify source and Javadoc artifacts
        run: |
          set -euo pipefail
          # Verify source/javadoc jars exist for all published modules.
          # tokido-identity-conformance is NOT published (maven.deploy.skip=true).
          # tokido-identity-bom is pom-only (no jar expected).
          # See docs/ROADMAP.md for the release runbook.
          for m in tokido-identity-api tokido-identity-engine tokido-identity-http \
                   tokido-identity-dev tokido-identity-test; do
            v=$(mvn -pl "$m" -q help:evaluate -Dexpression=project.version -DforceStdout)
            test -f "$m/target/${m}-${v}.jar"             || { echo "::error::missing jar for $m@$v"; exit 1; }
            test -f "$m/target/${m}-${v}-sources.jar"     || { echo "::error::missing sources jar for $m@$v"; exit 1; }
            test -f "$m/target/${m}-${v}-javadoc.jar"     || { echo "::error::missing javadoc jar for $m@$v"; exit 1; }
          done

      - name: Publish to Maven Central
        run: mvn deploy -P release -DskipTests -DskipITs
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
