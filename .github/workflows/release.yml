name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  # setup-java `cache: maven` uses actions/cache, which needs Actions cache API access
  actions: write

jobs:
  release:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          # setup-java generates ~/.m2/settings.xml with server credentials from these env var names.
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Verify no SNAPSHOT versions
        run: |
          set -euo pipefail
          # parked/ holds retired modules outside the reactor; they are never released.
          if grep -RIl --include=pom.xml 'SNAPSHOT' . | grep -v '^\./parked/' | grep -q .; then
            echo "::error::SNAPSHOT found in a pom"
            grep -RIn --include=pom.xml 'SNAPSHOT' . | grep -v '^\./parked/'; exit 1
          fi
          echo "All poms at release versions."

      - name: Build and verify
        run: mvn verify -P release -DskipITs
        env:
          # The release profile triggers maven-gpg-plugin during the verify
          # phase, which the parent settings.xml resolves via ${env.GPG_PASSPHRASE}.
          # Without this env block, the verify step fails with "Bad passphrase".
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Verify source and Javadoc artifacts
        run: |
          set -euo pipefail
          # Iterate the published modules (exclude bom/conformance/examples) and
          # confirm each produced jar + sources + javadoc.
          for m in tokido-identity-api tokido-identity-engine tokido-identity-http \
                   tokido-identity-dev tokido-identity-test tokido-identity-spring-boot-starter; do
            d=$(find . -type d -name "$m" -maxdepth 2 | head -1)
            v=$(mvn -pl "$d" -q help:evaluate -Dexpression=project.version -DforceStdout)
            test -f "$d/target/${m}-${v}.jar" || { echo "::error::missing jar $m@$v"; exit 1; }
            test -f "$d/target/${m}-${v}-sources.jar" || { echo "::error::missing sources $m@$v"; exit 1; }
            test -f "$d/target/${m}-${v}-javadoc.jar" || { echo "::error::missing javadoc $m@$v"; exit 1; }
          done

      - name: Publish to Maven Central
        run: mvn deploy -P release -DskipTests -DskipITs
        env:
          # Prefer the CENTRAL_TOKEN_* names; fall back to the legacy OSSRH_* secrets,
          # which hold the same Central Portal user token (used for the M0/M1 releases).
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME || secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD || secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
