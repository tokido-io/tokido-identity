name: native-smoke
on:
  pull_request: { branches: [main] }
  push: { branches: [main] }
jobs:
  native-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          cache: 'maven'
      - name: Build native smoke binary
        run: mvn -B -q -pl tokido-identity-engine -am -Pnative -DskipTests package
      - name: Run native smoke binary (real AOT gate)
        run: |
          BIN=tokido-identity-engine/target/tokido-native-smoke
          test -x "$BIN" || { echo "native binary not produced"; exit 1; }
          "$BIN"
