name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # setup-java `cache: maven` uses actions/cache, which needs Actions cache API access
  actions: write

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test with coverage
        # Builds tokido-identity-* reactor. See docs/ROADMAP.md for module details.
        run: mvn -B -U clean verify

      - name: Verify CODECOV_TOKEN is available
        if: success()
        shell: bash
        run: |
          if [[ -z "${{ secrets.CODECOV_TOKEN }}" ]]; then
            echo "CODECOV_TOKEN is not available to this workflow run."
            echo "If it is configured, ensure it's a *repository* Actions secret named exactly CODECOV_TOKEN,"
            echo "or that an organization/environment secret is correctly scoped to this repo/workflow."
            exit 1
          fi

      - name: Upload coverage reports to Codecov
        if: success()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          files: |
            **/target/site/jacoco/jacoco.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 7
